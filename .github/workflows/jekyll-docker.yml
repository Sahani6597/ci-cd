name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Registry (Docker Hub example)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sahani6597
          password: dckr_pat_BRx45zmzfX8DWJwesMoqRoN8Po8

      # 3️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t sahani6597/cicd:latest .

      # 4️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push sahani6597/cicd:latest
      - name : runnning in vm
        run : |
          ssh -i ${{secrets.SSH_PRIVATE_KEY}} azureuser@${{secrets.VM_HOST}}
          cd ci-cd
          sudo git pull
          sudo docker run -d -p 80:5000 sahani6597/cicd:latest
          echo "Deployemnt Success"
